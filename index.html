<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIZTET</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><text y='28' font-size='28'>🧠</text></svg>">

<!-- Sneller verbinden met externe servers (DNS + TLS alvast opzetten) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://lfhuuwdwyddzfisfgdor.supabase.co">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- BELANGRIJK: verhoog APP_VERSION bij elke deploy. Zo halen bezoekers de nieuwe
     versie op, maar wordt de code tussendoor gewoon gecachet (= veel sneller laden).
     GitHub Pages cachet max. 10 minuten, dus updates komen sowieso snel door. -->
<link rel="stylesheet" href="styles.css?v=18">
</head>
<body>
  <header class="app-header" id="appHeader" hidden>
    <div class="brand" data-nav="#/">QUIZTET</div>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    <nav class="topnav" id="topnav"></nav>
    <div class="userbox" id="userbox"></div>
  </header>

  <main id="app" class="app-main">
    <div class="loading">Laden…</div>
  </main>

  <div id="lastUpdate" class="last-update"></div>
  <div id="toast" class="toast" hidden></div>

  <!-- Supabase client (UMD, globale variabele `supabase`) — vastgepind op een
       vaste versie: geen redirect-keten meer en perfect cachebaar. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" defer></script>
  <script src="config.js?v=1" defer></script>
  <script src="app.js?v=24" defer></script>
</body>
</html>
